# Configuration for FNO on Darcy Flow (2D)
model:
  name: "FNO2d"
  in_channels: 1
  out_channels: 1
  modes1: 12        # Retain 12 low-frequency modes on X-axis
  modes2: 12        # Retain 12 low-frequency modes on Y-axis
  width: 32         # Hidden channel dimension
  num_layers: 4     # Number of integral operator layers
  padding: 9         # Zero padding used for non-periodic Darcy inputs
  append_grid: true  # Append (x, y) coordinates before lifting

training:
  batch_size: 20
  epochs: 500
  learning_rate: 0.001
  step_size: 100    # Halve learning rate every 100 epochs
  gamma: 0.5        # Multiplicative factor for learning rate decay

data:
  file_path: "data/piececonst_r421_N1024_smooth1.mat"
  x_key: "coeff"
  y_key: "sol"
  num_train: 1000
  num_test: 200
  subsample: 5
  resolution: 85    # 421 subsampled by 5 gives 85x85
