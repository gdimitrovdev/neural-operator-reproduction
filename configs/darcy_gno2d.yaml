# Configuration for GNO on Darcy Flow (2D)
model:
  name: "GNO2d"
  in_channels: 1
  out_channels: 1
  width: 32         # Hidden channel dimension
  radius: 0.25      # Integration radius parameter
  num_layers: 4     # Number of graph operator layers
  chunk_size: 64

training:
  batch_size: 5     # Smaller batch size for GNO due to higher memory usage
  epochs: 500
  learning_rate: 0.001
  weight_decay: 1e-4
  step_size: 100
  gamma: 0.5

seed:
  value: 0
  deterministic: false

logging:
  enabled: true
  output_dir: "runs"
  experiment_name: "darcy_gno2d"

data:
  file_path: "data/piececonst_r421_N1024_smooth1.mat"
  test_file_path: "data/piececonst_r421_N1024_smooth2.mat"
  normalize: true     # pointwise Gaussian normalization (official FNO Darcy setup)
  x_key: "coeff"
  y_key: "sol"
  num_train: 1000
  num_test: 200
  subsample: 5
  resolution: 85
  flatten_for_graph: true  # Required flag to format grid as graph nodes
