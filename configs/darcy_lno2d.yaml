model:
  name: "LNO2d"
  in_channels: 1
  out_channels: 1
  width: 32
  rank: 16
  num_layers: 4
  append_grid: true

training:
  batch_size: 20
  epochs: 500
  learning_rate: 0.001
  step_size: 100
  gamma: 0.5

data:
  file_path: "data/piececonst_r421_N1024_smooth1.mat"
  x_key: "coeff"
  y_key: "sol"
  num_train: 1000
  num_test: 200
  subsample: 5
  resolution: 85
