model:
  name: "MGNO2d"
  in_channels: 1
  out_channels: 1
  width: 32
  radius_fine: 0.15
  radius_coarse: 0.45
  chunk_size: 64

training:
  batch_size: 2     # dense O(N^2) kernel: keep batch small to fit GPU memory
  epochs: 200
  learning_rate: 0.001
  weight_decay: 1e-4
  step_size: 100
  gamma: 0.5

seed:
  value: 0
  deterministic: false

logging:
  enabled: true
  output_dir: "runs"
  experiment_name: "darcy_mgno2d_s43"

data:
  file_path: "data/piececonst_r421_N1024_smooth1.mat"
  test_file_path: "data/piececonst_r421_N1024_smooth2.mat"
  normalize: true
  x_key: "coeff"
  y_key: "sol"
  num_train: 1000
  num_test: 200
  subsample: 10     # 421 subsampled by 10 gives 43x43
  resolution: 43
