model:
  name: FNO1d
  in_channels: 1
  out_channels: 1
  modes: 16
  width: 64
  num_layers: 4
  append_grid: true
training:
  batch_size: 20
  epochs: 500
  learning_rate: 0.001
  weight_decay: 1e-4
  step_size: 100
  gamma: 0.5
seed:
  value: 0
  deterministic: false
logging:
  enabled: true
  output_dir: runs
  experiment_name: burgers_fno1d
data:
  file_path: data/burgers_data_R10.mat
  x_key: a
  y_key: u
  num_train: 1000
  num_test: 200
  subsample: 8
_config_path: configs/burgers_fno1d.yaml
