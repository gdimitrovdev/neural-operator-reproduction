data:
  file_path: data/piececonst_r421_N1024_smooth1.mat
  flatten_for_graph: true
  normalize: true
  num_test: 200
  num_train: 1000
  resolution: 43
  subsample: 10
  test_file_path: data/piececonst_r421_N1024_smooth2.mat
  x_key: coeff
  y_key: sol
logging:
  enabled: true
  experiment_name: darcy_gno2d_s43
  output_dir: runs
model:
  chunk_size: 64
  in_channels: 1
  name: GNO2d
  num_layers: 4
  out_channels: 1
  radius: 0.25
  width: 32
seed:
  deterministic: false
  value: 0
training:
  batch_size: 2
  epochs: 100
  gamma: 0.5
  learning_rate: 0.001
  step_size: 100
  weight_decay: 1e-4
_config_path: configs/darcy_gno2d_s43_ep100.yaml
